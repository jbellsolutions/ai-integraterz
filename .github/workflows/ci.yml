name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run smoke tests
        run: bash tests/smoke-test.sh

      - name: Validate JSON configs
        run: |
          echo "Validating config files..."
          jq '.' config/project.json > /dev/null
          jq '.' config/thresholds.json > /dev/null
          jq '.' config/clients/example-client.json > /dev/null
          echo "All JSON configs valid."

      - name: Check for placeholder leakage in configs
        run: |
          if grep -r "{{" config/ | grep -v "_comment" | grep -q "{{"; then
            echo "ERROR: Unresolved placeholders found in config/" && exit 1
          fi
          echo "No placeholder leakage in configs."

      - name: Verify lib scripts are executable
        run: |
          test -x lib/run-agent.sh || (echo "run-agent.sh not executable" && exit 1)
          test -x lib/new-client.sh || (echo "new-client.sh not executable" && exit 1)
          test -x lib/package-delivery.sh || (echo "package-delivery.sh not executable" && exit 1)
          echo "All lib scripts executable."

      - name: Run integration tests
        run: bash tests/integration-test.sh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
